version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: saju-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saju
      POSTGRES_USER: saju_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saju_user -d saju"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saju-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saju-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://saju_user:${POSTGRES_PASSWORD:-local_dev_password}@postgres:5432/saju
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,saju_backend=debug
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      REVENUECAT_API_KEY: ${REVENUECAT_API_KEY}
      R2_BUCKET_URL: ${R2_BUCKET_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      HMAC_SECRET: ${HMAC_SECRET:-local_dev_hmac_secret_minimum_32_characters}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-${ANTHROPIC_API_KEY}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
