name: saju_app
description: AI 사주 상담 플랫폼
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Auth & Security
  flutter_secure_storage: ^9.2.4
  kakao_flutter_sdk_user: ^1.9.5
  sign_in_with_apple: ^6.1.3
  google_sign_in: ^6.2.2

  # Payment
  purchases_flutter: ^8.4.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.7
  firebase_analytics: ^11.3.7

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4

  # Utils
  freezed_annotation: ^2.4.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  retrofit_generator: ^9.1.7

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
    - family: NotoSerifKR
      fonts:
        - asset: assets/fonts/NotoSerifKR-Regular.otf
        - asset: assets/fonts/NotoSerifKR-Bold.otf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
