name: saju_app
description: AI 사주 상담 플랫폼
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1

  # Auth & Security
  flutter_secure_storage: ^9.0.0
  kakao_flutter_sdk_user: ^1.9.1
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1

  # Payment
  purchases_flutter: ^6.17.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  image_gallery_saver: ^2.0.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_dynamic_links: ^5.5.0

  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  equatable: ^2.0.5
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
    - family: NotoSerifKR
      fonts:
        - asset: assets/fonts/NotoSerifKR-Regular.otf
        - asset: assets/fonts/NotoSerifKR-Bold.otf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
